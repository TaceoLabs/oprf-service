name: Build and Push (oprf-key-gen)

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - sg/docker_vuln
    tags:
      - 'oprf-key-gen-v*'

jobs:
  workflow:
    uses: ./.github/workflows/build-and-push.yml
    with:
      image-name: oprf-key-gen
      dockerfile: build/Dockerfile.oprf-key-gen

